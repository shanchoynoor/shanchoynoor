<svg width="495" height="195" viewBox="0 0 495 195" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="0.5" y="0.5" rx="4.5" height="194" stroke="#e4e2e2" width="494" fill="#fffefa" stroke-opacity="1" />
